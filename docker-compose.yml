version: '3.8'

# Landing-page only.
# The Sanity Studio + WhatsApp admin APIs live in `packages/sanity-studio`
# and are deployed separately to Vercel (eiat-v.vercel.app).
services:
  eiat-site:
    build:
      context: .
      dockerfile: packages/eiat-site/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SANITY_PROJECT_ID=${NEXT_PUBLIC_SANITY_PROJECT_ID:-f46widyg}
      - NEXT_PUBLIC_SANITY_DATASET=${NEXT_PUBLIC_SANITY_DATASET:-production}
      - SANITY_TOKEN=${SANITY_TOKEN}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    restart: unless-stopped
    networks:
      - eiat-network

networks:
  eiat-network:
    driver: bridge
